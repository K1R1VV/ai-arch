name: Movie Recommender CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  MLFLOW_TRACKING_URI: http://localhost:5000
  PYTHON_VERSION: '3.11'

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Установка Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.create false

      - name: Установка зависимостей
        run: poetry install --no-interaction --no-ansi

      - name: Запуск линтера (ruff)
        run: poetry run ruff check src/ scripts/ --exit-zero

      - name: Quality Gate проверка метрики модели
        run: poetry run python scripts/quality_gate.py

  train:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
    
    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Установка Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.create false

      - name: Установка зависимостей
        run: poetry install --no-interaction --no-ansi

      - name: Запуск локального MLflow для обучения
        run: |
          docker run -d \
            -p 5000:5000 \
            -v $(pwd)/mlflow_artifacts:/mlflow/artifacts \
            --name mlflow-ci \
            ghcr.io/mlflow/mlflow:v2.11.3 \
            mlflow server \
            --host 0.0.0.0 \
            --port 5000 \
            --backend-store-uri file:///mlflow/mlflow.db \
            --artifacts-destination /mlflow/artifacts \
            --serve-artifacts
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Ожидание запуска MLflow
        run: sleep 10

      - name: Обучение и регистрация модели
        run: poetry run python scripts/train_model.py
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000

      - name: Очистка после обучения
        run: docker rm -f mlflow-ci || true


  build:
    runs-on: ubuntu-latest
    needs: train
    if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Login в GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Подготовка тегов для образов
        id: meta
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_ID=ghcr.io/${REPO_LOWER}" >> $GITHUB_ENV
          echo "VERSION=${{ github.sha }}" >> $GITHUB_ENV
          echo "Image ID: ghcr.io/${REPO_LOWER}"
          echo "Version: ${{ github.sha }}"

      - name: Сборка и публикация API образа
        run: |
          docker build -f Dockerfile.api \
            -t ${{ env.IMAGE_ID }}/api:${{ env.VERSION }} \
            -t ${{ env.IMAGE_ID }}/api:latest .
          docker push ${{ env.IMAGE_ID }}/api:${{ env.VERSION }}
          docker push ${{ env.IMAGE_ID }}/api:latest

      - name: Сборка и публикация Worker образа
        run: |
          docker build -f Dockerfile.worker \
            -t ${{ env.IMAGE_ID }}/worker:${{ env.VERSION }} \
            -t ${{ env.IMAGE_ID }}/worker:latest .
          docker push ${{ env.IMAGE_ID }}/worker:${{ env.VERSION }}
          docker push ${{ env.IMAGE_ID }}/worker:latest
