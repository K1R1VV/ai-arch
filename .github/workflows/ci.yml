name: Movie Recommender CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Установка Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.create false

      - name: Установка зависимостей
        run: poetry install --no-interaction --no-ansi

      - name: Запуск линтера (ruff)
        run: |
          poetry run ruff check src/ scripts/ --fix || true
          poetry run ruff check src/ scripts/

      - name: Quality Gate проверка метрики модели (RMSE < 0.9)
        run: poetry run python scripts/quality_gate.py

  train:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
    
    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Установка Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.create false

      - name: Установка зависимостей
        run: poetry install --no-interaction --no-ansi

      - name: Запуск локального MLflow для обучения
        run: |
          docker run -d \
            -p 5000:5000 \
            -v ${{ github.workspace }}/mlflow_artifacts:/mlflow/artifacts \
            -v ${{ github.workspace }}/mlflow_db:/mlflow/db \
            --name mlflow-ci \
            ghcr.io/mlflow/mlflow:v2.11.3 \
            mlflow server \
            --host 0.0.0.0 \
            --port 5000 \
            --backend-store-uri sqlite:////mlflow/db/mlflow.db \
            --artifacts-destination file:///mlflow/artifacts \
            --serve-artifacts

      - name: Ожидание запуска MLflow
        run: sleep 15

      - name: Обучение и регистрация модели
        run: poetry run python scripts/train_model.py
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000
          EMBEDDING_SIZE: 50

      - name: Сохранение артефактов MLflow для downstream-стадий
        run: |
          mkdir -p .mlflow-artifacts
          cp -r mlflow_artifacts/* .mlflow-artifacts/ 2>/dev/null || true
          cp -r mlflow_db/* .mlflow-artifacts/db/ 2>/dev/null || true

      - name: Upload MLflow artifacts as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: .mlflow-artifacts/
          retention-days: 1
        continue-on-error: true

      - name: Очистка после обучения
        run: docker rm -f mlflow-ci || true

  build:
    runs-on: ubuntu-latest
    needs: train
    if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Download MLflow artifacts from previous stage
        uses: actions/download-artifact@v4
        with:
          name: mlflow-artifacts
          path: .mlflow-artifacts
        continue-on-error: true

      - name: Login в GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Подготовка тегов для образов
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_BASE=${{ env.REGISTRY }}/${REPO_LOWER}" >> $GITHUB_ENV
          echo "VERSION=${{ github.sha }}" >> $GITHUB_ENV
          echo "Image base: ${{ env.REGISTRY }}/${REPO_LOWER}"
          echo "Version: ${{ github.sha }}"

      - name: Сборка и публикация API образа
        run: |
          docker build -f Dockerfile.api \
            -t ${{ env.IMAGE_BASE }}/movies-api:${{ env.VERSION }} \
            -t ${{ env.IMAGE_BASE }}/movies-api:latest .
          docker push ${{ env.IMAGE_BASE }}/movies-api:${{ env.VERSION }}
          docker push ${{ env.IMAGE_BASE }}/movies-api:latest

      - name: Сборка и публикация Worker образа
        run: |
          docker build -f Dockerfile.worker \
            -t ${{ env.IMAGE_BASE }}/movies-worker:${{ env.VERSION }} \
            -t ${{ env.IMAGE_BASE }}/movies-worker:latest .
          docker push ${{ env.IMAGE_BASE }}/movies-worker:${{ env.VERSION }}
          docker push ${{ env.IMAGE_BASE }}/movies-worker:latest
