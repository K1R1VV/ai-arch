services:
  broker:
    image: redis:7-alpine
    container_name: movie-rec-redis
    ports:
      - "6379:6379"
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: movie-rec-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_artifacts:/mlflow/artifacts
      - ./mlflow_db:/mlflow/db
    command:
      - mlflow
      - server
      - --host
      - "0.0.0.0"
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/db/mlflow.db
      - --artifacts-destination
      - file:///mlflow/artifacts
      - --serve-artifacts
    networks:
      - ai-network
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:5000/health\")' || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: movie-rec-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://broker:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_PATH=/app/models/movie_recommender.onnx
      - LOG_LEVEL=INFO
    depends_on:
      broker:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    networks:
      - ai-network
    volumes:
      - ./models:/app/models

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: movie-rec-worker
    environment:
      - REDIS_URL=redis://broker:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_PATH=/app/models/movie_recommender.onnx
      - LOG_LEVEL=INFO
    depends_on:
      broker:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - ai-network
    volumes:
      - ./models:/app/models

networks:
  ai-network:
    driver: bridge