services:
  # Брокер сообщений
  broker:
    image: redis:7-alpine
    container_name: movie-rec-redis
    ports:
      - "6379:6379"
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: movie-rec-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_artifacts:/mlflow/artifacts
      - mlflow_db:/mlflow/db
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri file:///mlflow/db/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API сервис (FastAPI)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: movie-rec-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://broker:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_PATH=/app/models/movie_recommender.onnx
      - LOG_LEVEL=INFO
    depends_on:
      broker:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    networks:
      - ai-network
    volumes:
      - ./models:/app/models

  # Worker сервис
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: movie-rec-worker
    environment:
      - REDIS_URL=redis://broker:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_PATH=/app/models/movie_recommender.onnx
      - LOG_LEVEL=INFO
    depends_on:
      broker:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - ai-network
    volumes:
      - ./models:/app/models

# Volumes
volumes:
  mlflow_db:

networks:
  ai-network:
    driver: bridge