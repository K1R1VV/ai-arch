[pytest]
pythonpath = src
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    asyncio_integration: mark test as async integration test (requires running services)
    slow: mark test as slow-running
    unit: mark test as unit test (no external dependencies)

addopts = 
    -v
    --tb=short
    --strict-markers